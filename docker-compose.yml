version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: stayhub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stayhub_user
      POSTGRES_PASSWORD: stayhub_pass
      POSTGRES_DB: stayhub_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stayhub_user -d stayhub_db"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stayhub_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stayhub_user:stayhub_pass@db:5432/stayhub_db
      SECRET_KEY: stayhub-super-secret-key-2026-isaac-haro-torres
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 720
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
    container_name: stayhub_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads_data:
